<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');
      text { font-family: 'Fira Code', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="160" rx="8" fill="#0d1117"/>

  <!-- Top bar -->
  <rect width="600" height="32" rx="8" fill="#161b22"/>
  <rect y="24" width="600" height="8" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="16" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="16" r="5" fill="#febc2e"/>
  <circle cx="52" cy="16" r="5" fill="#28c840"/>

  <!-- Title -->
  <text x="300" y="21" text-anchor="middle" font-size="12" fill="#8b949e">bash — awais@nust</text>

  <!-- Terminal lines -->
  <text x="24" y="58" font-size="13" fill="#38bdf8">$</text>
  <text x="38" y="58" font-size="13" fill="#94a3b8">whoami</text>
  <text x="120" y="58" font-size="13" fill="#e2e8f0">Muhammad Awais Abdullah</text>

  <text x="24" y="80" font-size="13" fill="#38bdf8">$</text>
  <text x="38" y="80" font-size="13" fill="#94a3b8">cat role.txt</text>
  <text x="150" y="80" font-size="13" fill="#e2e8f0">Backend Engineer · Full-Stack · Real-time</text>

  <text x="24" y="102" font-size="13" fill="#38bdf8">$</text>
  <text x="38" y="102" font-size="13" fill="#94a3b8">echo $UNI</text>
  <text x="138" y="102" font-size="13" fill="#e2e8f0">NUST Islamabad — CS 2027</text>

  <text x="24" y="124" font-size="13" fill="#38bdf8">$</text>
  <text x="38" y="124" font-size="13" fill="#94a3b8">echo $STATUS</text>
  <text x="150" y="124" font-size="13" fill="#e2e8f0">Freelancing since Jan 2025</text>

  <text x="24" y="146" font-size="13" fill="#38bdf8">$</text>
  <text x="38" y="146" font-size="13" fill="#94a3b8">echo $OPEN_TO</text>
  <text x="162" y="146" font-size="13" fill="#e2e8f0">Internships · Remote · Freelance</text>

  <!-- Blinking cursor -->
  <rect x="366" y="133" width="8" height="14" fill="#38bdf8" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
