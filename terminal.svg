<svg width="620" height="185" viewBox="0 0 620 185" xmlns="http://www.w3.org/2000/svg" xml:space="preserve">

  <!-- Background -->
  <rect width="620" height="185" rx="10" fill="#0d1117"/>

  <!-- Title bar -->
  <rect width="620" height="36" rx="10" fill="#161b22"/>
  <rect y="26" width="620" height="10" fill="#161b22"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="18" r="6" fill="#ff5f57"/>
  <circle cx="42" cy="18" r="6" fill="#febc2e"/>
  <circle cx="62" cy="18" r="6" fill="#28c840"/>

  <!-- Title -->
  <text x="310" y="23"
        text-anchor="middle"
        font-size="12"
        fill="#8b949e"
        font-family="Courier New, monospace"
        text-rendering="geometricPrecision">
    bash — awais@nust: ~
  </text>

  <!-- Shared style -->
  <g font-family="Courier New, monospace"
     font-size="13.5"
     text-rendering="geometricPrecision"
     xml:space="preserve">

    <!-- Line 1 -->
    <text x="20" y="66">
      <tspan fill="#38bdf8">$ </tspan>
      <tspan fill="#94a3b8">whoami</tspan>
      <tspan fill="#4a5568">  </tspan>
      <tspan fill="#e2e8f0">Muhammad Awais Abdullah</tspan>
    </text>

    <!-- Line 2 -->
    <text x="20" y="91">
      <tspan fill="#38bdf8">$ </tspan>
      <tspan fill="#94a3b8">cat role.txt</tspan>
      <tspan fill="#4a5568">  </tspan>
      <tspan fill="#e2e8f0">Backend Engineer · Full-Stack · Real-time</tspan>
    </text>

    <!-- Line 3 -->
    <text x="20" y="116">
      <tspan fill="#38bdf8">$ </tspan>
      <tspan fill="#94a3b8">echo $UNI</tspan>
      <tspan fill="#4a5568">  </tspan>
      <tspan fill="#e2e8f0">NUST Islamabad — CS 2027</tspan>
    </text>

    <!-- Line 4 -->
    <text x="20" y="141">
      <tspan fill="#38bdf8">$ </tspan>
      <tspan fill="#94a3b8">echo $STATUS</tspan>
      <tspan fill="#4a5568">  </tspan>
      <tspan fill="#e2e8f0">Freelancing since Jan 2025</tspan>
    </text>

    <!-- Line 5 -->
    <text x="20" y="166">
      <tspan fill="#38bdf8">$ </tspan>
      <tspan fill="#94a3b8">echo $OPEN_TO</tspan>
      <tspan fill="#4a5568"> </tspan>
      <tspan fill="#e2e8f0">Internships · Remote · Freelance</tspan>
    </text>

  </g>

  <!-- Cursor (stable positioning) -->
  <rect x="360" y="153" width="8" height="15" fill="#38bdf8">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

</svg>
